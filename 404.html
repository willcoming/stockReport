<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      (function () {
        var parts = window.location.pathname.split("/").filter(Boolean);
        var repo = parts.shift() || "";
        var base = repo ? "/" + repo + "/" : "/";
        var clean = parts.join("/").replace(/\/index\.html$/, "").replace(/\.html$/, "");
        var route = "/";
        var report = clean.match(/^reports\/([^/]+)(?:\/(?:daily|candidates))?$/);
        var breakoutTw = clean.match(/^breakout\/reports\/(\d{4}-\d{2}-\d{2})$/);
        var breakoutUs = clean.match(/^breakout\/us\/reports\/(\d{4}-\d{2}-\d{2})$/);

        if (report) {
          route = "/reports/" + report[1];
        } else if (breakoutTw) {
          route = "/breakout/tw/" + breakoutTw[1];
        } else if (breakoutUs) {
          route = "/breakout/us/" + breakoutUs[1];
        } else if (clean === "performance" || clean === "performance/tw") {
          route = "/performance/hot/tw";
        } else if (clean === "performance/us") {
          route = "/performance/hot/us";
        } else if (clean === "breakout/performance") {
          route = "/performance/breakout/tw";
        } else if (clean === "breakout/us-performance") {
          route = "/performance/breakout/us";
        }

        window.location.replace(base + "#/" + route.replace(/^\/+/, ""));
      })();
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
